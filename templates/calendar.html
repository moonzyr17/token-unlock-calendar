<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar — Token Unlock Calendar</title>
<meta name="theme-color" content="#0F172A">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink: { 950: '#020617', 900: '#0E1223', 800: '#0F172A', 700: '#1E293B', 600: '#334155' },
          fg: '#F8FAFC',
          fg2: '#94A3B8',
          brand: { DEFAULT: '#2563EB', light: '#3B82F6', soft: 'rgba(37,99,235,0.12)' },
          accent: '#059669',
          warn: '#F59E0B',
          bad: '#DC2626',
        },
        fontFamily: {
          display: ['"Orbitron"', 'ui-sans-serif'],
          sans: ['"Exo 2"', 'ui-sans-serif'],
          mono: ['"JetBrains Mono"', 'ui-monospace'],
        }
      }
    }
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700&family=Orbitron:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --bg: #020617; }
  body {
    background:
      radial-gradient(900px 500px at 0% -10%, rgba(37,99,235,0.10), transparent 65%),
      radial-gradient(900px 500px at 100% 0%, rgba(5,150,105,0.07), transparent 70%),
      var(--bg);
    color: #F8FAFC;
    font-family: 'Exo 2', ui-sans-serif, system-ui;
  }
  .display { font-family: 'Orbitron', ui-sans-serif; letter-spacing: -0.01em; }
  .panel { background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.005));
           border: 1px solid rgba(255,255,255,0.06); }
  .num { font-feature-settings: "tnum" 1; font-variant-numeric: tabular-nums; }
  /* Calendar cells */
  .cal-cell {
    aspect-ratio: 1 / 1;
    background: rgba(255,255,255,0.015);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 6px;
    padding: 4px 6px;
    display: flex; flex-direction: column;
    transition: border-color 150ms, background 150ms;
    cursor: default;
  }
  .cal-cell.has-events { cursor: pointer; }
  .cal-cell.has-events:hover { border-color: rgba(37,99,235,0.5); background: rgba(37,99,235,0.06); }
  .cal-cell.dim { opacity: 0.35; }
  .cal-cell.today { border-color: rgba(245,158,11,0.6); box-shadow: 0 0 0 1px rgba(245,158,11,0.4); }
  .cal-cell.selected { border-color: rgba(5,150,105,0.7); background: rgba(5,150,105,0.10); }
  /* Heat shading by USD volume */
  .heat-1 { background: rgba(37,99,235,0.05); }
  .heat-2 { background: rgba(37,99,235,0.10); }
  .heat-3 { background: rgba(37,99,235,0.18); }
  .heat-4 { background: rgba(37,99,235,0.28); }
  .heat-5 { background: rgba(220,38,38,0.30); }
  .pulse-dot { display: inline-block; width: 8px; height: 8px; border-radius: 9999px; background: #059669;
    box-shadow: 0 0 0 0 rgba(5,150,105,0.6); animation: pulse 1.6s infinite; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(5,150,105,0.55); }
    70% { box-shadow: 0 0 0 12px rgba(5,150,105,0); }
    100% { box-shadow: 0 0 0 0 rgba(5,150,105,0); }
  }
  :focus-visible { outline: 2px solid #3B82F6; outline-offset: 2px; border-radius: 6px; }
  .scrollbar::-webkit-scrollbar { width: 6px; }
  .scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 3px; }
  @media (prefers-reduced-motion: reduce) {
    .pulse-dot, .cal-cell { animation: none; transition: none; }
  }
</style>
</head>
<body class="min-h-screen">

<header class="border-b border-white/5 sticky top-0 z-30 backdrop-blur-md bg-ink-950/85">
  <div class="max-w-[1400px] mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-4">
    <a href="/" class="flex items-center gap-2.5">
      <div class="w-9 h-9 rounded-md bg-gradient-to-br from-brand-light to-accent flex items-center justify-center">
        <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <path d="M16 2v4M8 2v4M3 10h18"/>
          <circle cx="12" cy="15" r="2.2" fill="currentColor"/>
        </svg>
      </div>
      <p class="text-sm font-bold display">UNLOCK CAL</p>
    </a>
    <div class="flex items-center gap-2">
      <span class="hidden sm:flex items-center gap-2 text-xs text-fg2 font-mono px-2 py-1 rounded border border-white/5">
        <span class="pulse-dot"></span><span>live</span>
      </span>
      <a href="https://github.com/moonzyr17/token-unlock-calendar" target="_blank" rel="noopener"
         class="text-xs sm:text-sm px-3 py-1.5 rounded-md border border-white/10 hover:border-brand transition flex items-center gap-2">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.55v-2.04c-3.2.7-3.87-1.36-3.87-1.36-.52-1.32-1.27-1.67-1.27-1.67-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.02 1.76 2.69 1.25 3.34.96.1-.74.4-1.25.72-1.54-2.55-.29-5.24-1.27-5.24-5.66 0-1.25.45-2.27 1.18-3.07-.12-.29-.51-1.46.11-3.04 0 0 .96-.31 3.15 1.18.91-.25 1.89-.38 2.86-.38.97 0 1.95.13 2.86.38 2.18-1.49 3.14-1.18 3.14-1.18.62 1.58.23 2.75.11 3.04.74.8 1.18 1.82 1.18 3.07 0 4.4-2.69 5.36-5.25 5.65.41.36.78 1.06.78 2.13v3.16c0 .31.21.67.8.55C20.21 21.39 23.5 17.07 23.5 12 23.5 5.65 18.35.5 12 .5z"/></svg>
        <span class="hidden sm:inline">source</span>
      </a>
    </div>
  </div>
</header>

<main class="max-w-[1400px] mx-auto px-3 sm:px-6 py-5 sm:py-6">

  <!-- Toolbar -->
  <section class="panel rounded-xl p-3 sm:p-4 mb-4 flex flex-wrap items-center justify-between gap-3">
    <div class="flex items-center gap-2">
      <button id="prev-btn" type="button" class="px-3 py-2 rounded-md bg-ink-900 hover:bg-ink-700 transition border border-white/5" aria-label="Previous month">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 19l-7-7 7-7"/></svg>
      </button>
      <button id="today-btn" type="button" class="px-3 py-2 text-xs rounded-md bg-ink-900 hover:bg-ink-700 transition border border-white/5 font-mono">Today</button>
      <button id="next-btn" type="button" class="px-3 py-2 rounded-md bg-ink-900 hover:bg-ink-700 transition border border-white/5" aria-label="Next month">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 5l7 7-7 7"/></svg>
      </button>
      <h2 id="month-title" class="display text-lg sm:text-2xl font-bold ml-2">—</h2>
    </div>

    <div class="flex flex-wrap items-center gap-2 text-xs">
      <select id="filter-token" class="bg-ink-900 border border-white/5 rounded px-2 py-2 font-mono">
        <option value="">All tokens</option>
      </select>
      <select id="filter-recipient" class="bg-ink-900 border border-white/5 rounded px-2 py-2 font-mono">
        <option value="">All recipients</option>
        <option>Team</option><option>Investors</option><option>Ecosystem</option>
        <option>Foundation</option><option>Mixed</option>
      </select>
      <select id="filter-type" class="bg-ink-900 border border-white/5 rounded px-2 py-2 font-mono">
        <option value="">All types</option>
        <option>monthly</option><option>cliff</option><option>linear</option>
      </select>
    </div>
  </section>

  <!-- Layout: calendar + side panel -->
  <div class="grid lg:grid-cols-[1fr_360px] gap-4">

    <!-- Calendar grid -->
    <section class="panel rounded-xl p-3 sm:p-4">
      <div class="grid grid-cols-7 gap-1 mb-1 text-[10px] uppercase tracking-widest text-fg2 font-mono text-center">
        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
      </div>
      <div id="cal-grid" class="grid grid-cols-7 gap-1"></div>

      <!-- Legend -->
      <div class="mt-4 pt-3 border-t border-white/5 flex flex-wrap items-center gap-3 text-[10px] font-mono text-fg2">
        <span>Volume:</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded heat-1 border border-white/10"></span>&lt;$10M</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded heat-2 border border-white/10"></span>$10–50M</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded heat-3 border border-white/10"></span>$50–150M</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded heat-4 border border-white/10"></span>$150–400M</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded heat-5 border border-white/10"></span>&gt;$400M</span>
      </div>
    </section>

    <!-- Side panel: selected day or month list -->
    <aside class="panel rounded-xl p-4 lg:max-h-[calc(100vh-200px)] overflow-y-auto scrollbar">
      <div id="side-summary" class="mb-3"></div>
      <div id="side-events" class="space-y-2.5"></div>
    </aside>
  </div>

  <!-- Bottom: monthly stats -->
  <section class="mt-4 grid grid-cols-2 sm:grid-cols-4 gap-2 sm:gap-3">
    <div class="panel rounded-md p-3">
      <p class="text-[10px] uppercase tracking-widest text-fg2 font-mono">Events this month</p>
      <p class="display text-xl sm:text-2xl font-bold mt-1 num" id="m-count">—</p>
    </div>
    <div class="panel rounded-md p-3">
      <p class="text-[10px] uppercase tracking-widest text-fg2 font-mono">USD volume</p>
      <p class="display text-xl sm:text-2xl font-bold mt-1 num text-brand-light" id="m-volume">—</p>
    </div>
    <div class="panel rounded-md p-3">
      <p class="text-[10px] uppercase tracking-widest text-fg2 font-mono">Biggest day</p>
      <p class="display text-xl sm:text-2xl font-bold mt-1 num" id="m-bigday">—</p>
    </div>
    <div class="panel rounded-md p-3">
      <p class="text-[10px] uppercase tracking-widest text-fg2 font-mono">Tokens unlocking</p>
      <p class="display text-xl sm:text-2xl font-bold mt-1 num text-accent" id="m-tokens">—</p>
    </div>
  </section>

</main>

<script>
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const TODAY = new Date();
const TODAY_ISO = TODAY.toISOString().slice(0,10);

const state = {
  year: TODAY.getFullYear(),
  month: TODAY.getMonth() + 1, // 1-12
  data: null,                   // {year,month,by_date,total_events}
  selectedDate: null,           // 'YYYY-MM-DD'
  filters: { token: '', recipient: '', type: '' },
  allTokens: [],
};

const els = {
  grid: document.getElementById('cal-grid'),
  title: document.getElementById('month-title'),
  prev: document.getElementById('prev-btn'),
  next: document.getElementById('next-btn'),
  today: document.getElementById('today-btn'),
  ftoken: document.getElementById('filter-token'),
  frecipient: document.getElementById('filter-recipient'),
  ftype: document.getElementById('filter-type'),
  sideSum: document.getElementById('side-summary'),
  sideEvts: document.getElementById('side-events'),
  mCount: document.getElementById('m-count'),
  mVolume: document.getElementById('m-volume'),
  mBigday: document.getElementById('m-bigday'),
  mTokens: document.getElementById('m-tokens'),
};

// ---------- helpers ----------
function fmtUsd(m) { return m >= 1000 ? `$${(m/1000).toFixed(2)}B` : `$${m.toFixed(1)}M`; }
function pad(n) { return String(n).padStart(2,'0'); }
function heatClass(v) {
  if (v <= 0) return '';
  if (v < 10) return 'heat-1';
  if (v < 50) return 'heat-2';
  if (v < 150) return 'heat-3';
  if (v < 400) return 'heat-4';
  return 'heat-5';
}
function passesFilter(ev) {
  if (state.filters.token && ev.token_symbol !== state.filters.token) return false;
  if (state.filters.recipient && ev.recipient !== state.filters.recipient) return false;
  if (state.filters.type && ev.unlock_type !== state.filters.type) return false;
  return true;
}

// ---------- API ----------
async function loadCalendar() {
  const r = await fetch(`/api/calendar?year=${state.year}&month=${state.month}`);
  state.data = await r.json();
  render();
}

async function loadTokens() {
  const r = await fetch('/api/tokens');
  const j = await r.json();
  state.allTokens = j.tokens;
  els.ftoken.innerHTML = '<option value="">All tokens</option>' +
    j.tokens.map(t => `<option value="${t.token_symbol}">${t.token_symbol} · ${t.token_name}</option>`).join('');
  // Pre-select if URL has ?token=
  const u = new URL(location.href);
  if (u.searchParams.get('token')) {
    state.filters.token = u.searchParams.get('token').toUpperCase();
    els.ftoken.value = state.filters.token;
  }
}

// ---------- render ----------
function render() {
  if (!state.data) return;
  const { year, month, by_date } = state.data;
  els.title.textContent = `${MONTH_NAMES[month-1]} ${year}`;

  // Build cells: align week to Sunday
  const first = new Date(year, month-1, 1);
  const startWeekday = first.getDay(); // 0=Sun
  const daysInMonth = new Date(year, month, 0).getDate();
  const prevMonthDays = new Date(year, month-1, 0).getDate();

  // Grid total: ceil((startWeekday + daysInMonth) / 7) * 7
  const cells = [];
  // Leading days from prev month
  for (let i = startWeekday - 1; i >= 0; i--) {
    const d = prevMonthDays - i;
    const prevM = month === 1 ? 12 : month - 1;
    const prevY = month === 1 ? year - 1 : year;
    cells.push({ date: `${prevY}-${pad(prevM)}-${pad(d)}`, day: d, dim: true });
  }
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({ date: `${year}-${pad(month)}-${pad(d)}`, day: d, dim: false });
  }
  while (cells.length % 7 !== 0) {
    const last = cells[cells.length-1];
    const lastDate = new Date(last.date);
    lastDate.setDate(lastDate.getDate()+1);
    cells.push({
      date: lastDate.toISOString().slice(0,10),
      day: lastDate.getDate(),
      dim: true,
    });
  }

  // Compute filtered totals per date
  const filtered = {};
  let monthTotalUsd = 0, monthEvents = 0; const tokensInMonth = new Set();
  let bigDay = { date: null, usd: 0 };
  Object.entries(by_date).forEach(([d, info]) => {
    const evs = info.events.filter(passesFilter);
    if (!evs.length) return;
    const sumUsd = evs.reduce((s,e)=> s + (e.amount_usd_estimate||0), 0);
    filtered[d] = { events: evs, total_usd: sumUsd, count: evs.length };
    monthTotalUsd += sumUsd; monthEvents += evs.length;
    evs.forEach(e => tokensInMonth.add(e.token_symbol));
    if (sumUsd > bigDay.usd) bigDay = { date: d, usd: sumUsd };
  });

  els.grid.innerHTML = cells.map(c => {
    const info = filtered[c.date];
    const has = !!info;
    const heat = has ? heatClass(info.total_usd) : '';
    const isToday = c.date === TODAY_ISO;
    const isSel = c.date === state.selectedDate;
    const cls = [
      'cal-cell',
      c.dim ? 'dim' : '',
      has ? 'has-events' : '',
      heat,
      isToday ? 'today' : '',
      isSel ? 'selected' : '',
    ].filter(Boolean).join(' ');

    let dot = '';
    if (has) {
      const big = info.events[0];
      dot = `<div class="mt-auto flex items-center justify-between gap-1">
              <span class="text-[10px] font-bold display truncate">${big.token_symbol}${info.count>1 ? ` +${info.count-1}` : ''}</span>
              <span class="text-[10px] num text-fg2">${fmtUsd(info.total_usd)}</span>
            </div>`;
    }
    return `<button type="button" class="${cls}" data-date="${c.date}" ${has?'':'disabled aria-disabled="true"'}>
              <span class="text-xs num ${isToday?'text-warn font-bold':''}">${c.day}</span>
              ${dot}
            </button>`;
  }).join('');

  // Stats
  els.mCount.textContent = monthEvents || '—';
  els.mVolume.textContent = monthTotalUsd ? fmtUsd(monthTotalUsd) : '—';
  els.mBigday.textContent = bigDay.date ? `${bigDay.date.slice(8,10)} · ${fmtUsd(bigDay.usd)}` : '—';
  els.mTokens.textContent = tokensInMonth.size || '—';

  // Wire cell clicks
  els.grid.querySelectorAll('.cal-cell.has-events').forEach(b => {
    b.addEventListener('click', () => {
      state.selectedDate = b.dataset.date;
      render();
      renderSide(filtered);
    });
  });

  if (!state.selectedDate || !filtered[state.selectedDate]) {
    state.selectedDate = bigDay.date;
  }
  renderSide(filtered);
}

function renderSide(filtered) {
  const d = state.selectedDate;
  if (!d || !filtered[d]) {
    els.sideSum.innerHTML = `<p class="text-sm text-fg2">No events match these filters in this month.</p>`;
    els.sideEvts.innerHTML = '';
    return;
  }
  const info = filtered[d];
  els.sideSum.innerHTML = `
    <p class="text-[11px] uppercase tracking-widest text-fg2 font-mono">${d}</p>
    <p class="display text-xl font-bold mt-1">${info.count} event${info.count>1?'s':''} · <span class="text-brand-light">${fmtUsd(info.total_usd)}</span></p>
  `;
  els.sideEvts.innerHTML = info.events.map(e => `
    <div class="rounded-lg p-3 bg-white/[0.02] border border-white/5">
      <div class="flex items-start justify-between gap-2 mb-1.5">
        <div class="flex items-center gap-2 min-w-0">
          ${e.logo_url
            ? `<img src="${e.logo_url}" alt="${e.token_symbol}" class="w-7 h-7 rounded-full bg-ink-700 object-cover" loading="lazy">`
            : `<div class="w-7 h-7 rounded-full bg-ink-700 flex items-center justify-center text-[10px] font-bold font-mono">${e.token_symbol.slice(0,3)}</div>`}
          <div class="min-w-0">
            <p class="font-bold display text-sm">${e.token_symbol}</p>
            <p class="text-[11px] text-fg2 truncate">${e.token_name}</p>
          </div>
        </div>
        <span class="text-[10px] uppercase tracking-wider px-1.5 py-0.5 rounded font-mono shrink-0
          ${e.unlock_type==='cliff'?'bg-bad/15 text-bad'
           : e.unlock_type==='monthly'?'bg-brand-soft text-brand-light'
           : 'bg-white/5 text-fg2'}">${e.unlock_type}</span>
      </div>
      <p class="font-bold num text-base">${fmtUsd(e.amount_usd_estimate)}</p>
      <p class="text-[11px] text-fg2 font-mono mt-1">${e.amount_tokens?.toLocaleString?.() || e.amount_tokens}M tokens · ${e.pct_of_circulating?.toFixed(2)}% circ · ${e.recipient}</p>
      <p class="text-[11px] text-fg2 mt-1.5 leading-relaxed">${e.description || ''}</p>
    </div>
  `).join('');
}

// ---------- events ----------
function move(delta) {
  let m = state.month + delta, y = state.year;
  if (m < 1) { m = 12; y--; }
  if (m > 12) { m = 1; y++; }
  state.month = m; state.year = y;
  state.selectedDate = null;
  loadCalendar();
}
els.prev.addEventListener('click', () => move(-1));
els.next.addEventListener('click', () => move(1));
els.today.addEventListener('click', () => {
  state.year = TODAY.getFullYear(); state.month = TODAY.getMonth()+1;
  state.selectedDate = TODAY_ISO; loadCalendar();
});
[els.ftoken, els.frecipient, els.ftype].forEach((el, i) => {
  el.addEventListener('change', () => {
    state.filters = {
      token: els.ftoken.value,
      recipient: els.frecipient.value,
      type: els.ftype.value,
    };
    state.selectedDate = null;
    render();
  });
});

(async () => {
  await loadTokens();
  await loadCalendar();
})();
</script>
</body>
</html>
